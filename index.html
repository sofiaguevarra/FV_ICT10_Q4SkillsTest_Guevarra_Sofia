 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Attendance Tracker</title>
       <py-config>
           packages = ['numpy', 'matplotlib']
       </py-config>
  <style>
       .container {
           max-width: 300px;
           margin: 50px auto;
           background-color: #899dcc;   
           padding: 30px;
           border-radius: 8px;
      }
    select, button {
           width: 60%;
           padding: 10px;
           margin-bottom: 20px;
    }
       button {
           background-color: #343b6c;
           color: white;
           border: none;
           border-radius: 5px;
           cursor: pointer;
           max-width: 100px;
       }
  </style>
</head>
<body>
    <center>
    <div class="container">
   <label for="day_absences">Select Day:</label>
   <br>
  <select id="day_absences">
   <option>Monday</option>
   <option>Tuesday</option>
   <option>Wednesday</option>
   <option>Thursday</option>
   <option>Friday</option>
</select>

<br><br>
<div>
<label for="number_absences">Number of Absences:</label>
</div>
<input type="text" id="number_absences" placeholder="Enter here"></div>
 <input type="button" py-click="submit_button" value="Submit"></div>
</div>

</center>


<script type="py" src="main.py"></script>

</body>
</html>
